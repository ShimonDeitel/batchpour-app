name: Batchpour
options:
  bundleIdPrefix: com.shimondeitel.concretecraftlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Batchpour:
    type: application
    platform: iOS
    sources:
      - path: Batchpour
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.concretecraftlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Batchpour/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BatchpourTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BatchpourTests
      - path: Batchpour.storekit
    dependencies:
      - target: Batchpour
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.concretecraftlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BatchpourUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BatchpourUITests
    dependencies:
      - target: Batchpour
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.concretecraftlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Batchpour:
    build:
      targets:
        Batchpour: all
        BatchpourTests: [test]
        BatchpourUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Batchpour.storekit
    test:
      config: Debug
      storeKitConfiguration: Batchpour.storekit
      targets:
        - BatchpourTests
        - BatchpourUITests
    archive:
      config: Release
